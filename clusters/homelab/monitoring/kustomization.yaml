apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
generatorOptions:
  disableNameSuffixHash: true
resources:
  - helm-release.yaml
  - helm-source.yaml
  - namespace.yaml
configMapGenerator:
  - name: robusta-values
    files:
      - values.yaml=../../../sandbox/monitoring/robusta-values.yaml
