serviceMonitor:
  enabled: true
trivy:
  image:
    registry: ghcr.io
    repository: aquasecurity/trivy
  dbRegistry: ghcr.io
  dbRepository: aquasecurity/trivy-db
  javaDbRegistry: ghcr.io
  javaDbRepository: aquasecurity/trivy-java-db
  ignoreUnfixed: true
  podLabels:
    app: trivy
  timeout: "60m"
  severity: "MEDIUM,HIGH,CRITICAL"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 4Gi
  server:
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 4Gi
operator:
  builtInTrivyServer: true
  scanJobTimeout: "60m"
  infraAssessmentScannerEnabled: false
  scanJobPodTemplateContainerSecurityContext:
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    privileged: false
resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 200m
    memory: 256Mi
