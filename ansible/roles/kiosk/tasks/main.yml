---
- name: Configure GDM3 Auto-Login
  ini_file:
    path: /etc/gdm3/daemon.conf
    section: daemon
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    no_extra_spaces: true
  loop:
    - { option: 'AutomaticLoginEnable', value: 'true' }
    - { option: 'AutomaticLogin', value: "{{ kiosk_user }}" }

- name: Ensure Firefox policy directory exists
  file:
    path: /etc/firefox/policies
    state: directory
    mode: '0755'

- name: Apply Firefox policies
  copy:
    src: firefox-policies.json
    dest: /etc/firefox/policies/policies.json
    mode: '0644'

- name: Ensure autostart directory exists for kiosk user
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ kiosk_user }}"
    group: "{{ kiosk_user }}"
    mode: '0755'
  loop:
    - "/home/{{ kiosk_user }}/.config/autostart"
    - "/home/{{ kiosk_user }}/.local/bin"

- name: Create Kiosk launcher script
  copy:
    content: |
      #!/bin/bash
      while true; do
          firefox --kiosk 'http://ha.lan/family-dash/home'
          sleep 2
      done
    dest: "/home/{{ kiosk_user }}/.local/bin/kiosk-launcher.sh"
    owner: "{{ kiosk_user }}"
    group: "{{ kiosk_user }}"
    mode: '0755'

- name: Create Kiosk idle monitor script
  copy:
    content: |
      #!/bin/bash
      TIMEOUT_MS=60000 # 60 seconds
      while true; do
          IDLE_TIME=$(gdbus call --session --dest org.gnome.Mutter.IdleMonitor --object-path /org/gnome/Mutter/IdleMonitor/Core --method org.gnome.Mutter.IdleMonitor.GetIdletime | awk '{print $2}' | tr -d ',')
          
          if [ -n "$IDLE_TIME" ] && [ "$IDLE_TIME" -gt "$TIMEOUT_MS" ]; then
              killall firefox
              sleep 10
          fi
          sleep 5
      done
    dest: "/home/{{ kiosk_user }}/.local/bin/kiosk-idle-monitor.sh"
    owner: "{{ kiosk_user }}"
    group: "{{ kiosk_user }}"
    mode: '0755'

- name: Create Kiosk autostart entries
  copy:
    content: |
      [Desktop Entry]
      Type=Application
      Name={{ item.name }}
      Exec={{ item.exec }}
      X-GNOME-Autostart-enabled=true
    dest: "/home/{{ kiosk_user }}/.config/autostart/{{ item.dest }}"
    owner: "{{ kiosk_user }}"
    group: "{{ kiosk_user }}"
    mode: '0644'
  loop:
    - { name: 'Home Assistant Kiosk Launcher', exec: "/home/{{ kiosk_user }}/.local/bin/kiosk-launcher.sh", dest: 'kiosk.desktop' }
    - { name: 'Kiosk Idle Monitor', exec: "/home/{{ kiosk_user }}/.local/bin/kiosk-idle-monitor.sh", dest: 'idle-monitor.desktop' }

- name: Disable GNOME Screen Sleep and Multi-Workspace
  become: true
  become_user: "{{ kiosk_user }}"
  dconf:
    key: "{{ item.key }}"
    value: "{{ item.value }}"
  loop:
    - { key: "/org/gnome/desktop/session/idle-delay", value: "uint32 0" }
    - { key: "/org/gnome/settings-daemon/plugins/power/sleep-inactive-ac-timeout", value: "0" }
    - { key: "/org/gnome/mutter/dynamic-workspaces", value: "false" }
    - { key: "/org/gnome/desktop/wm/preferences/num-workspaces", value: "1" }
