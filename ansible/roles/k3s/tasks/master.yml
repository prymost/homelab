---
- name: Check if k3s is already installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_bin

- name: Install k3s server
  shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--node-ip {{ ansible_host }}" sh -
  when: not k3s_bin.stat.exists

- name: Wait for node-token to be generated
  wait_for:
    path: /var/lib/rancher/k3s/server/node-token

- name: Read node-token from master
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: master_token_encoded
  no_log: true

- name: Set k3s_token fact for the cluster
  set_fact:
    k3s_token: "{{ master_token_encoded.content | b64decode | trim }}"
    cacheable: yes
  delegate_to: "{{ item }}"
  delegate_facts: true
  loop: "{{ groups['k3s_cluster'] }}"
  no_log: true

- name: Fetch kubeconfig from master
  slurp:
    src: /etc/rancher/k3s/k3s.yaml
  register: kubeconfig_encoded

- name: Save localised kubeconfig to DevContainer
  copy:
    content: "{{ kubeconfig_encoded.content | b64decode | replace('127.0.0.1', ansible_host) }}"
    dest: "/home/vscode/.kube/config-homelab"
    mode: '0600'
  delegate_to: localhost
  become: false
