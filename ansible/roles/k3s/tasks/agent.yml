---
- name: Check if k3s is already installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_bin

- name: Install k3s agent
  shell: |
    curl -sfL https://get.k3s.io | K3S_URL="https://{{ hostvars[groups['k3s_master'][0]]['ansible_host'] }}:6443" K3S_TOKEN="{{ k3s_token }}" sh -s - agent --node-ip {{ ansible_host }}
  no_log: true
  when: 
    - not k3s_bin.stat.exists
    - k3s_token is defined
